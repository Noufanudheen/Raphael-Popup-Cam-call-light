<!doctype html><html><head><meta charset="utf-8"><title>Raphael Popup Camera Light</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><h1>Raphael Popup Camera Light</h1><form id="config"><label>Enabled<input type="checkbox" id="enabled"></label><label>Rule<select id="rule"><option value="always">Always</option><option value="silent">Only Silent</option><option value="vibrate">Only Vibrate</option><option value="normal">Only Normal</option></select></label><label>Speed (ms)<input type="number" id="speed_ms" min="50" max="2000"></label><label>Pattern (ms comma)<input type="text" id="pattern"></label><button type="submit">Save</button></form><div id="status"></div></div><script src="app.js"></script></body></html>
